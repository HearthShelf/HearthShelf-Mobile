name: iOS TestFlight

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  build_ios:
    name: Build iOS (production)
    type: build
    params:
      platform: ios
      profile: production

  submit_ios:
    name: Submit to TestFlight
    needs: [build_ios]
    type: submit
    params:
      platform: ios
      profile: production
      build_id: ${{ needs.build_ios.outputs.build_id }}
