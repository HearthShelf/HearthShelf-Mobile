name: Build Android Release

# Produces a SIGNED release .aab (Android App Bundle) for the Play Store and,
# on a version tag, drives the full release: publish to the Play internal track
# and publish the changelog to hearthshelf.com.
#
# Triggers:
#   - push tag 'v*'   -> tag-driven CD. Builds the signed .aab, publishes to
#                        Play (internal track), and uploads the changelog. The
#                        tag is the single source of version truth: the pushed
#                        tag sets the app `version` (and OTA runtimeVersion), so
#                        no file is hand-edited to cut a release.
#   - workflow_dispatch -> manual artifact build only. Produces a signed .aab or
#                        APK artifact; the publish + changelog steps are skipped
#                        (they are gated on the tag event), so a manual run can
#                        never ship to the store.
#
# Version model:
#   - user-facing `version` comes from the tag (v0.1.0 -> 0.1.0). Pre-release
#     labels are normalized to the website's channel tokens (v0.1.0-beta.1 ->
#     0.1.0-Beta1) so the changelog lands in the Beta channel. The one normalized
#     string feeds BOTH the baked app version (EXPO_PUBLIC_APP_VERSION) and the
#     uploaded changelog version, so the binary, OTA runtime, and website agree.
#   - android versionCode stays github.run_number: strictly increasing (Play's
#     hard requirement) and decoupled from semver. Only release-workflow AABs go
#     to Play, so its run_number sequence is the authoritative monotonic counter.
#
# The upload keystore never lives in the repo. It is stored as a base64 GitHub
# Actions secret, decoded to a temp file on the runner, and the signing
# passwords are secrets too. The hearthshelf-signing config plugin injects the
# release signingConfig at prebuild and reads the values as Gradle properties;
# we pass them via ORG_GRADLE_PROJECT_* env vars (Gradle maps
# ORG_GRADLE_PROJECT_FOO -> the `FOO` project property automatically), so no
# secret is ever written into build.gradle.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   ANDROID_KEYSTORE_BASE64      base64 of your upload.jks  (base64 -w0 upload.jks)
#   ANDROID_KEYSTORE_PASSWORD    the keystore (store) password
#   ANDROID_KEY_ALIAS            the key alias (e.g. upload)
#   ANDROID_KEY_PASSWORD         the key password
#   PLAY_SERVICE_ACCOUNT_JSON    Google Play service-account JSON (tag publish)
#   CHANGELOG_API_KEY            Bearer token matching the website binding
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      artifact_kind:
        description: 'Bundle for Play (.aab) or a signed APK for sideload testing'
        type: choice
        default: aab
        options: [aab, apk]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
          fetch-depth: 0 # changelog needs full history + tags for the diff range

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21 # RN 0.86 / Expo 57 request a Java 21 toolchain

      - uses: android-actions/setup-android@v3

      - run: npm ci

      # Normalize the tag into the version string used everywhere. Runs only on
      # a tag push; dispatch builds skip it and app.config.js uses the 0.0.1
      # default. The normalized label (dot removed, glued to digits) is what the
      # website's channel filter matches: -Beta / -Alpha / -RC.
      - name: Resolve release version from tag
        if: github.ref_type == 'tag'
        id: version
        run: |
          RAW="${GITHUB_REF_NAME#v}"
          VER=$(printf '%s' "$RAW" \
            | sed -E 's/-(beta|b)\.?([0-9]+)/-Beta\2/I' \
            | sed -E 's/-(alpha|a)\.?([0-9]+)/-Alpha\2/I' \
            | sed -E 's/-rc\.?([0-9]+)/-RC\1/I')
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Tag $GITHUB_REF_NAME -> app version $VER"

      - name: Decode upload keystore
        id: keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/upload.jks"
          # Fail early if the secret was empty/missing rather than producing a
          # broken build much later.
          test -s "$RUNNER_TEMP/upload.jks" || { echo "::error::ANDROID_KEYSTORE_BASE64 is empty or missing"; exit 1; }

      - name: Prebuild (runs config plugins, incl. release signing)
        env:
          HEARTHSHELF_RELEASE_SIGNING: '1'
          HEARTHSHELF_RELEASE_KEYSTORE_PATH: ${{ runner.temp }}/upload.jks
          HEARTHSHELF_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          HEARTHSHELF_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          HEARTHSHELF_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          # A release build embeds its JS by default, so standalone-js is not
          # needed here (that plugin only affects the DEBUG variant).
          EXPO_ANDROID_VERSION_CODE: ${{ github.run_number }}
          # On a tag build this is the normalized semver; on dispatch it is empty
          # so app.config.js falls back to '0.0.1'.
          EXPO_PUBLIC_APP_VERSION: ${{ steps.version.outputs.version }}
        run: npx expo prebuild --platform android --no-install

      # Fail fast if the baked version doesn't match the tag - catches a broken
      # resolver before shipping a mis-versioned OTA runtime. Buffers stdin fully
      # so a chunked --json response can't crash the assertion.
      - name: Assert baked version matches tag
        if: github.ref_type == 'tag'
        env:
          EXPO_PUBLIC_APP_VERSION: ${{ steps.version.outputs.version }}
        run: |
          BAKED=$(npx expo config --type public --json \
            | node -e 'let s="";process.stdin.on("data",d=>s+=d).on("end",()=>console.log(JSON.parse(s).version))')
          echo "baked version: $BAKED (expected ${{ steps.version.outputs.version }})"
          test "$BAKED" = "${{ steps.version.outputs.version }}" \
            || { echo "::error::baked version $BAKED != tag ${{ steps.version.outputs.version }}"; exit 1; }

      - name: Build signed artifact
        env:
          # Gradle maps ORG_GRADLE_PROJECT_X -> project property X, which is what
          # the injected signingConfig reads via providers.gradleProperty('X').
          ORG_GRADLE_PROJECT_HEARTHSHELF_RELEASE_KEYSTORE_PATH: ${{ runner.temp }}/upload.jks
          ORG_GRADLE_PROJECT_HEARTHSHELF_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_HEARTHSHELF_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ORG_GRADLE_PROJECT_HEARTHSHELF_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          # Expo's template jvmargs (2 GiB heap/512 MiB metaspace, in the
          # gitignored android/gradle.properties) OOMs the Gradle daemon during
          # :app:minifyReleaseWithR8 now that minification is on. GRADLE_OPTS
          # overrides it without depending on that file surviving prebuild.
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4096m -XX:MaxMetaspaceSize=1024m"
        run: |
          # On a tag push inputs.artifact_kind is empty, so default to aab.
          KIND="${{ inputs.artifact_kind }}"; KIND="${KIND:-aab}"
          # --stacktrace surfaces the real exception (packageRelease wraps the
          # cause in IncrementalSplitterRunnable and hides it otherwise).
          if [ "$KIND" = "apk" ]; then
            ./gradlew :app:assembleRelease --stacktrace
          else
            ./gradlew :app:bundleRelease --stacktrace
          fi
        working-directory: android

      - name: Upload .aab
        # Tag builds are always .aab (no dispatch input); dispatch honors the choice.
        if: github.ref_type == 'tag' || inputs.artifact_kind == 'aab'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab-${{ github.run_number }}
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      - name: Upload signed APK
        if: github.ref_type != 'tag' && inputs.artifact_kind == 'apk'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      # ---- tag-only publish + changelog (gated on ref_type == 'tag') ----------

      - name: Publish to Play (internal track)
        if: github.ref_type == 'tag'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.hearthshelf.mobile
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed

      - name: Publish changelog to hearthshelf.com
        if: github.ref_type == 'tag'
        env:
          CHANGELOG_API_KEY: ${{ secrets.CHANGELOG_API_KEY }}
          CHANGELOG_API_URL: https://hearthshelf.com/api/v1/changelogs
          PRODUCT: HearthShelf-Mobile
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          DOWNLOAD_URL: https://play.google.com/store/apps/details?id=com.hearthshelf.mobile
          # GITHUB_REF / GITHUB_REF_NAME are provided automatically.
        run: |
          chmod +x .github/scripts/changelog-items.sh .github/scripts/upload-changelog.sh
          .github/scripts/upload-changelog.sh

      - name: Add changelog to run summary
        if: github.ref_type == 'tag'
        run: |
          if [ -f CHANGELOG.md ]; then cat CHANGELOG.md >> "$GITHUB_STEP_SUMMARY"; fi
