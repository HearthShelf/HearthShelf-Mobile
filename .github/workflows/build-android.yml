name: Build Android

# Builds a debug APK artifact you can sideload. Runs automatically on every push
# to main (always have a fresh APK waiting), and on manual dispatch from the
# Actions tab. Always a standalone build on push (JS embedded, so it runs
# untethered / in the car); manual dispatch can toggle that off.
#
# This produces an UNSIGNED-for-release debug APK (debug keystore). Play Store
# release signing + upload is a separate step that needs the upload keystore as
# encrypted secrets - see RELEASE.md. We do not put signing here yet so secrets
# aren't required to use this workflow.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      standalone:
        description: 'Embed JS in the APK (untethered/in-car build)'
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21 # RN 0.86 / Expo 57 request a Java 21 toolchain

      - uses: android-actions/setup-android@v3

      - run: npm ci

      - name: Prebuild (runs config plugins, incl. Android Auto + standalone-js)
        env:
          # Push builds are always standalone; manual dispatch honors the toggle.
          # (push events carry no inputs, so inputs.standalone is empty there.)
          HEARTHSHELF_STANDALONE_DEBUG: ${{ (github.event_name == 'push' || inputs.standalone) && '1' || '0' }}
          # Stamp the CI run number as the Android versionCode so every build is
          # distinguishable on-device (Settings -> App info) and monotonic.
          EXPO_ANDROID_VERSION_CODE: ${{ github.run_number }}
        run: npx expo prebuild --platform android --no-install

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug
        working-directory: android

      - uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
