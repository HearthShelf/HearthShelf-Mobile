name: Build iOS Simulator

# Builds an unsigned iOS Simulator app on GitHub's macOS runners. This catches
# native iOS/prebuild/Pods/Xcode issues without needing an Apple developer
# account, provisioning profile, TestFlight, or a physical device.
on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/build-ios-simulator.yml'
      - 'app/**'
      - 'assets/**'
      - 'packages/core/**'
      - 'plugins/**'
      - 'src/**'
      - 'app.config.js'
      - 'babel.config.js'
      - 'index.js'
      - 'package-lock.json'
      - 'package.json'
      - 'tsconfig.json'

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Prebuild iOS project
        env:
          EXPO_IOS_BUILD_NUMBER: ${{ github.run_number }}
        run: npx expo prebuild --platform ios

      - name: Build simulator app
        run: |
          set -o pipefail
          xcodebuild \
            -workspace ios/HearthShelf.xcworkspace \
            -scheme HearthShelf \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Upload simulator app
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app-${{ github.run_number }}
          path: ios/build/Build/Products/Debug-iphonesimulator/*.app
          if-no-files-found: error
